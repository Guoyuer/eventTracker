name: event_tracker
description: An event tracker in Flutter

# The following line prevents the package from being accidentally published to
# pub.dev using `pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

# The following defines the version and build number for your application.
# A version number is three numbers separated by dots, like 1.2.43
# followed by an optional build number separated by a +.
# Both the version and the builder number may be overridden in flutter
# build by specifying --build-name and --build-number, respectively.
# In Android, build-name is used as versionName while build-number used as versionCode.
# Read more about Android versioning at https://developer.android.com/studio/publish/versioning
# In iOS, build-name is used as CFBundleShortVersionString while build-number used as CFBundleVersion.
# Read more about iOS versioning at
# https://developer.apple.com/library/archive/documentation/General/Reference/InfoPlistKeyReference/Articles/CoreFoundationKeys.html
version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter_localizations:
    sdk: flutter
  flutter:
    sdk: flutter
  flutter_riverpod: ^3.3.2
  fluttertoast: ^9.1.0
  intl: ^0.20.2
  fl_chart: ^1.2.0
  sqflite: ^2.4.3
  # Pinned exactly (not ^2.34.1) to match drift_dev 2.34.0: drift_dev's schema
  # verifier tooling (dump/generate/SchemaVerifier) does not yet implement the
  # GeneratedDatabase.schema / allSchemaEntities API that drift >=2.34.1's
  # drift3_preview introduced, so `dart run drift_dev schema --help` fails to
  # compile against drift ^2.34.1. Upgrading drift_dev to 2.34.2+1 instead
  # (Try A) is blocked by a separate pub solver conflict: drift_dev >=2.34.1+1
  # requires analyzer ^13.0.0, which is incompatible with build_runner ^2.15.1
  # given the test/flutter_test constraints in this project. Unpin once a
  # drift_dev release restores compatibility with drift ^2.34.1+.
  drift: 2.34.0
  drift_sqflite: ^2.0.1
  path_provider: ^2.1.6
  sqlite3_flutter_libs: ^0.5.42
  path: ^1.9.1
  sqflite_common_ffi: ^2.4.2

dev_dependencies:
  analyzer: ^12.1.0
  flutter_test:
    sdk: flutter
  build_runner: ^2.15.1
  drift_dev: ^2.34.0
  flutter_lints: ^6.0.0
  sqlite3: ^3.3.4

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec
#assets:
#  - assets/data/shareQRCode.png
# The following section is specific to Flutter.
flutter:
  uses-material-design: true
